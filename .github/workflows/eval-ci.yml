name: eval-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (the harness tests itself)
        run: npm test

      - name: Prove the gate catches a bad model
        run: |
          if npm run eval:bad; then
            echo "ERROR: bad model unexpectedly passed the gate" >&2
            exit 1
          else
            echo "OK: gate correctly failed the bad model"
          fi

      - name: Run evaluation gate (stub model, no API key required)
        run: npm run eval

      - name: Upload eval reports (json + html + scorecard)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: |
            reports/latest.json
            reports/report.html
            reports/scorecard.md
