name: eval-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      # Keep the Promptfoo runs hermetic: no telemetry, no update checks, no
      # network beyond installing the package. The provider path is already
      # offline (stub / bad models, no API key); these make that explicit.
      PROMPTFOO_DISABLE_TELEMETRY: "1"
      PROMPTFOO_DISABLE_UPDATE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (the harness tests itself)
        run: npm test

      - name: Prove the gate catches a bad model
        run: |
          if npm run eval:bad; then
            echo "ERROR: bad model unexpectedly passed the gate" >&2
            exit 1
          else
            echo "OK: gate correctly failed the bad model"
          fi

      - name: Run evaluation gate (stub model, no API key required)
        run: npm run eval

      - name: Promptfoo negative control (BadModel must fail every case on assertions)
        run: |
          npx promptfoo eval -c promptfoo/promptfooconfig.bad.yaml --no-cache \
            --output promptfoo/promptfoo-bad-report.json || true
          node promptfoo/check-bad-report.mjs promptfoo/promptfoo-bad-report.json

      - name: Promptfoo gate (stub model, offline smoke gate, no API key)
        run: npx promptfoo eval -c promptfoo/promptfooconfig.yaml --no-cache --output promptfoo/promptfoo-report.json promptfoo/promptfoo-report.html

      - name: Upload eval reports (json + html + scorecard)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: |
            reports/latest.json
            reports/report.html
            reports/scorecard.md

      - name: Upload Promptfoo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-report
          path: |
            promptfoo/promptfoo-report.json
            promptfoo/promptfoo-report.html
            promptfoo/promptfoo-bad-report.json
